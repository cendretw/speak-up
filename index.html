<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>口語流暢度助理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #F4F4F9; 
            touch-action: manipulation; 
        }
        
        /* 普普風 / 新粗野主義 (Neo-brutalism) 樣式 */
        .brutal-box {
            border: 3px solid #1E293B;
            border-radius: 1rem;
            box-shadow: 4px 4px 0px #1E293B;
            background-color: #FFFFFF;
        }
        
        .brutal-btn {
            border: 3px solid #1E293B;
            border-radius: 1rem;
            box-shadow: 4px 4px 0px #1E293B;
            transition: all 0.1s ease;
            font-weight: 900;
        }
        
        .brutal-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #1E293B;
        }

        .bg-pop-yellow { background-color: #FFDE59; }
        .bg-pop-blue { background-color: #38B6FF; }
        .bg-pop-pink { background-color: #FF914D; }
        .bg-pop-green { background-color: #00E676; }

        /* 螢光筆效果 */
        .highlight-correct { background-color: #dcfce7; color: #166534; padding: 0 2px; border-radius: 4px; }
        .highlight-error { background-color: #fee2e2; color: #991b1b; padding: 0 2px; border-bottom: 3px solid #ef4444; font-weight: bold; }
        
        /* 回音小芽動畫 */
        @keyframes sprout-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }
        .animate-sprout { animation: sprout-bounce 2s infinite ease-in-out; }
        
        @keyframes leaf-wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }
        .listening .sprout-leaf { animation: leaf-wiggle 0.5s infinite ease-in-out; transform-origin: bottom center; fill: #00E676; }
        .listening .sprout-face { border-color: #FF914D; }

        /* 隱藏捲軸但可捲動 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- 導覽動畫區塊 -->
    <div id="onboarding" class="fixed inset-0 z-50 bg-pop-yellow flex flex-col items-center justify-center p-6 transition-transform duration-500">
        <svg viewBox="0 0 100 100" class="w-40 h-40 animate-sprout mb-6 drop-shadow-xl" id="onboardSprout">
            <rect x="20" y="40" width="60" height="50" rx="25" fill="#FFFFFF" stroke="#1E293B" stroke-width="4"/>
            <path d="M50 40 Q40 20 30 25 Q45 10 50 40 Z" fill="#00E676" stroke="#1E293B" stroke-width="3" class="sprout-leaf"/>
            <path d="M50 40 Q60 20 70 25 Q55 10 50 40 Z" fill="#00E676" stroke="#1E293B" stroke-width="3" class="sprout-leaf"/>
            <circle cx="38" cy="65" r="5" fill="#1E293B"/>
            <circle cx="62" cy="65" r="5" fill="#1E293B"/>
            <circle cx="28" cy="72" r="4" fill="#FF914D" opacity="0.6"/>
            <circle cx="72" cy="72" r="4" fill="#FF914D" opacity="0.6"/>
            <path d="M45 75 Q50 80 55 75" fill="none" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
        </svg>

        <div class="brutal-box p-6 md:p-8 text-center max-w-sm w-full relative">
            <div class="absolute -top-4 -left-4 w-8 h-8 bg-pop-pink rounded-full border-2 border-slate-800"></div>
            <div class="absolute -bottom-3 -right-3 w-6 h-6 bg-pop-blue rounded-full border-2 border-slate-800"></div>
            
            <h2 id="obTitle" class="text-2xl font-black mb-3">歡迎使用口語流暢度助理！</h2>
            <p id="obText" class="text-slate-600 font-bold leading-relaxed mb-6">我是回音小芽 🌱<br>每一次開口，都是讓我成長的養分喔！</p>
            
            <button onclick="nextStep()" id="obBtn" class="brutal-btn bg-pop-blue text-white text-xl px-8 py-3 w-full tracking-wide">
                開始導覽 (1/3)
            </button>
        </div>
    </div>

    <!-- 主程式區塊 -->
    <div id="mainApp" class="max-w-3xl mx-auto w-full flex flex-col flex-1 h-screen overflow-y-auto">
        
        <header id="mainHeader" class="p-4 flex justify-between items-end sticky top-0 z-20 bg-[#F4F4F9]/90 backdrop-blur-md pb-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">口語流暢度助理</h1>
                <p class="text-sm text-slate-500 font-bold mt-1 bg-white inline-block px-2 py-0.5 rounded border-2 border-slate-800 shadow-[2px_2px_0px_#1E293B]">Made by Daphne Lin</p>
            </div>
            <!-- 右上角小精靈 -->
            <svg viewBox="0 0 100 100" class="w-12 h-12 hidden md:block" id="headerSprout">
                <rect x="20" y="40" width="60" height="50" rx="25" fill="#FFFFFF" stroke="#1E293B" stroke-width="4"/>
                <path d="M50 40 Q40 20 30 25 Q45 10 50 40 Z" fill="#00E676" stroke="#1E293B" stroke-width="3"/>
                <circle cx="38" cy="65" r="4" fill="#1E293B"/><circle cx="62" cy="65" r="4" fill="#1E293B"/>
                <path d="M45 75 Q50 80 55 75" fill="none" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </header>

        <main id="recordPage" class="flex-1 p-4 flex flex-col space-y-5">
            
            <div class="brutal-box p-4 bg-pop-yellow">
                <label class="block text-sm font-black text-slate-800 mb-2 uppercase">Who are you?</label>
                <input type="text" id="studentName" placeholder="輸入姓名 (選填)" class="w-full p-3 border-2 border-slate-800 rounded-lg focus:outline-none focus:ring-4 focus:ring-slate-300 font-bold text-lg">
            </div>

            <div class="brutal-box p-4 flex-1 flex flex-col relative min-h-[250px]">
                <div class="flex justify-between items-center mb-3">
                    <label class="text-lg font-black text-slate-800">練習文章</label>
                    <div class="flex gap-2">
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <button onclick="document.getElementById('imageInput').click()" class="brutal-btn bg-pop-pink text-white px-4 py-1.5 text-sm flex items-center">
                            📷 掃描課本
                        </button>
                        <button onclick="clearText()" class="text-sm font-bold text-slate-400 hover:text-slate-600 px-2 underline decoration-2">清除</button>
                    </div>
                </div>
                
                <textarea id="targetText" 
                    class="flex-1 w-full p-4 border-2 border-slate-200 bg-slate-50 rounded-xl focus:outline-none focus:border-slate-800 text-lg leading-relaxed resize-none font-medium"
                    placeholder="請貼上英文文章，或點選上方按鈕掃描..."></textarea>

                <div id="ocrOverlay" class="hidden absolute inset-0 bg-white/90 z-10 flex flex-col items-center justify-center rounded-xl">
                    <div class="animate-spin text-4xl mb-2">🌱</div>
                    <p id="ocrStatus" class="text-slate-800 font-black animate-pulse">小芽努力辨識中...</p>
                </div>
            </div>

            <!-- 動態狀態提示區 -->
            <div class="text-center min-h-[40px] flex items-center justify-center gap-3" id="statusContainer">
                <p id="liveStatus" class="font-bold text-slate-400">準備好就按下開始，我會認真聽！</p>
                <p id="transcriptPreview" class="text-sm text-slate-400 font-bold truncate hidden max-w-[200px]"></p>
            </div>

            <div class="pb-6">
                <button id="startBtn" onclick="startReading()" class="brutal-btn bg-pop-blue text-white py-5 w-full text-2xl flex items-center justify-center gap-2">
                    🎤 開始挑戰
                </button>
                
                <button id="stopBtn" onclick="stopReading()" class="hidden brutal-btn bg-red-500 text-white py-5 w-full text-2xl flex items-center justify-center gap-2">
                    🛑 完成並分析
                </button>
            </div>
        </main>

        <main id="resultsPage" class="hidden pb-12 flex-1 overflow-y-auto p-4 space-y-6">
            
            <div class="flex justify-between items-center">
                <button onclick="resetApp()" class="brutal-btn bg-white text-slate-800 px-4 py-2 flex items-center gap-2 text-sm">
                    ◀ 再試一次
                </button>
                <button onclick="downloadReport()" class="brutal-btn bg-pop-green text-slate-800 px-4 py-2 flex items-center gap-2 text-sm">
                    💾 下載報告
                </button>
            </div>

            <div id="reportContent" class="brutal-box p-5 md:p-8 bg-white relative">
                
                <div class="text-center border-b-4 border-slate-800 pb-4 mb-6">
                    <h2 class="text-3xl font-black text-slate-800 uppercase">Fluency Report</h2>
                    <p id="displayDate" class="text-sm text-slate-500 font-bold mt-2"></p>
                    <p id="displayName" class="text-pop-blue font-black text-xl mt-1 hidden"></p>
                </div>

                <div class="grid grid-cols-3 gap-3 md:gap-6 mb-8">
                    <div class="border-3 border-slate-800 rounded-xl p-3 text-center bg-pop-yellow shadow-[4px_4px_0px_#1E293B]">
                        <div class="text-xs md:text-sm font-black text-slate-800 uppercase">準確度</div>
                        <div id="scoreAccuracy" class="text-2xl md:text-4xl font-black text-slate-800 mt-1">0%</div>
                    </div>
                    <div class="border-3 border-slate-800 rounded-xl p-3 text-center bg-pop-blue shadow-[4px_4px_0px_#1E293B]">
                        <div class="text-xs md:text-sm font-black text-white uppercase">語速 WPM</div>
                        <div id="scoreWPM" class="text-2xl md:text-4xl font-black text-white mt-1">0</div>
                    </div>
                    <div class="border-3 border-slate-800 rounded-xl p-3 text-center bg-white shadow-[4px_4px_0px_#1E293B]">
                        <div class="text-xs md:text-sm font-black text-slate-800 uppercase">等級</div>
                        <div id="scoreGrade" class="text-2xl md:text-4xl font-black text-slate-800 mt-1">B</div>
                    </div>
                </div>

                <div class="border-3 border-slate-800 rounded-xl p-5 mb-8 bg-[#F4F4F9] relative">
                    <h3 class="font-black text-slate-800 text-lg mb-3 flex items-center gap-2">
                        🌱 小芽的觀察報告
                    </h3>
                    <div id="teacherFeedback" class="space-y-3 text-slate-700 font-bold text-sm leading-relaxed">
                        <!-- 回饋內容 -->
                    </div>
                </div>

                <div class="mb-8">
                    <h3 class="font-black text-slate-800 text-lg mb-3 bg-pop-pink text-white inline-block px-3 py-1 border-2 border-slate-800 rounded shadow-[2px_2px_0px_#1E293B]">
                        需要加強的單字
                    </h3>
                    <div class="border-3 border-slate-800 rounded-xl overflow-hidden">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-slate-100 border-b-3 border-slate-800 text-slate-800">
                                <tr>
                                    <th class="px-4 py-3 font-black uppercase">Word</th>
                                    <th class="px-4 py-3 font-black uppercase">Status</th>
                                    <th class="px-4 py-3 font-bold uppercase hidden md:table-cell">Tips</th>
                                </tr>
                            </thead>
                            <tbody id="errorTableBody" class="divide-y-2 divide-slate-200 bg-white">
                                <!-- 錯誤表格內容 -->
                            </tbody>
                        </table>
                        <div id="noErrorsMessage" class="hidden p-6 text-center font-black text-pop-blue bg-white">
                            太完美了！完全沒有錯誤 🎉
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="font-black text-slate-800 text-sm uppercase mb-2">--- 全文檢視 (Full Text) ---</h3>
                    <div id="visualResult" class="text-lg leading-loose text-slate-600 font-medium p-4 border-2 border-dashed border-slate-300 rounded-xl"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 導覽流程 (Onboarding) ---
        let step = 0;
        function nextStep() {
            step++;
            const title = document.getElementById('obTitle');
            const text = document.getElementById('obText');
            const btn = document.getElementById('obBtn');
            const sprout = document.getElementById('onboardSprout');

            if (step === 1) {
                title.innerText = "Step 1: 準備文章";
                text.innerHTML = "先把要練習的英文貼上來，<br>或是點擊『掃描課本』拍照也可以喔！📄";
                btn.innerText = "下一步 (2/3)";
                btn.className = "brutal-btn bg-pop-pink text-white text-xl px-8 py-3 w-full tracking-wide";
                sprout.querySelector('.sprout-leaf').setAttribute('fill', '#FFDE59'); 
            } else if (step === 2) {
                title.innerText = "Step 2: 自信開口";
                text.innerHTML = "深呼吸，不要怕念錯。<br>大聲且自信地唸出來，我會仔細聽！🎧";
                btn.innerText = "準備好了！🚀";
                btn.className = "brutal-btn bg-pop-green text-slate-800 text-xl px-8 py-3 w-full tracking-wide";
                sprout.querySelector('.sprout-leaf').setAttribute('fill', '#38B6FF');
            } else {
                // 結束導覽，將動畫滑出畫面
                document.getElementById('onboarding').style.transform = 'translateY(-100vh)';
                setTimeout(() => document.getElementById('onboarding').style.display = 'none', 500);
            }
        }

        // --- 語音辨識與核心邏輯 (V4 錨點演算法) ---
        let recognition;
        let isRecording = false;
        let isManuallyStopped = false;
        let startTime;
        let fullTranscript = '';
        
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const liveStatus = document.getElementById('liveStatus');
        const transcriptPreview = document.getElementById('transcriptPreview');
        const targetTextArea = document.getElementById('targetText');
        const container = document.getElementById('statusContainer');

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = false; // V4 核心：逐句模式，瀏覽器停頓自動結束
            recognition.interimResults = false; 
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isRecording = true;
                liveStatus.textContent = "錄音中... 小芽正在認真聽！";
                liveStatus.className = "font-black text-pop-pink animate-pulse";
                container.classList.add('listening'); // 觸發小芽搖頭動畫
                transcriptPreview.classList.remove('hidden');
            };

            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') {
                    alert("麥克風權限被拒絕，請檢查設定。");
                    stopReading();
                }
            };

            recognition.onresult = (event) => {
                let lastChunk = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        lastChunk = event.results[i][0].transcript;
                    }
                }
                if (lastChunk) {
                    fullTranscript += lastChunk + ' ';
                    transcriptPreview.textContent = lastChunk;
                }
            };
            
            // 負責自動重啟或進入分析
            recognition.onend = () => {
                if (isManuallyStopped) {
                    analyzeAndShowResults();
                } else if (isRecording) {
                    try { recognition.start(); } 
                    catch (e) { analyzeAndShowResults(); }
                }
            };
        } else {
            alert("您的瀏覽器不支援，建議使用 Chrome 或 Edge 以獲得最佳體驗。");
            startBtn.disabled = true;
        }

        function startReading() {
            if (!targetTextArea.value.trim()) {
                alert("請先輸入或掃描文章內容！");
                return;
            }
            isManuallyStopped = false;
            isRecording = true;
            fullTranscript = '';
            
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            
            startTime = new Date();
            try { recognition.start(); } 
            catch(e) { alert("麥克風啟動失敗，請重整網頁。"); }
        }

        function stopReading() {
            isManuallyStopped = true;
            isRecording = false;
            recognition.stop(); 
            container.classList.remove('listening');
            stopBtn.innerHTML = `⏳ 分析中...`;
        }

        function cleanText(txt) {
            return txt.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"'“”]/g, "").replace(/\s+/g, " ").trim();
        }

        function analyzeAndShowResults() {
            const endTime = new Date();
            const durationSecs = Math.max(1, (endTime - startTime) / 1000);
            
            const rawTarget = targetTextArea.value.replace(/\s+/g, " ").trim();
            const spokenText = fullTranscript.trim();

            const originalTargetWords = rawTarget.split(' ');
            const targetWords = originalTargetWords.map(cleanText); 
            const spokenWords = cleanText(spokenText).split(' ');

            let visualHTML = '';
            let errors = [];
            let correctCount = 0;
            let spokenIndex = 0; 

            // V4 錨點搜尋演算法
            for (let i = 0; i < targetWords.length; i++) {
                const currentTargetWord = targetWords[i];
                const originalWord = originalTargetWords[i];
                
                if (currentTargetWord === "") {
                    visualHTML += `${originalWord} `; 
                    continue;
                }

                const foundIndex = spokenWords.indexOf(currentTargetWord, spokenIndex);

                if (foundIndex !== -1) {
                    correctCount++;
                    visualHTML += `<span class="highlight-correct mx-0.5">${originalWord}</span> `;
                    spokenIndex = foundIndex + 1; // 錨點同步
                } else {
                    visualHTML += `<span class="highlight-error mx-0.5">${originalWord}</span> `;
                    errors.push({ word: originalWord });
                }
            }

            const targetWordCount = targetWords.filter(w => w !== "").length;
            const accuracy = (targetWordCount > 0) ? Math.round((correctCount / targetWordCount) * 100) : 0;
            const wpm = Math.round((correctCount / durationSecs) * 60);

            // 更新 UI
            document.getElementById('scoreAccuracy').innerText = accuracy + "%";
            document.getElementById('scoreWPM').innerText = wpm;
            
            const d = new Date();
            document.getElementById('displayDate').innerText = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
            
            const sName = document.getElementById('studentName').value;
            if(sName) {
                document.getElementById('displayName').innerText = sName;
                document.getElementById('displayName').classList.remove('hidden');
            }

            let grade = 'C';
            if (accuracy >= 90 && wpm >= 100) grade = 'A+';
            else if (accuracy >= 85) grade = 'A';
            else if (accuracy >= 70) grade = 'B';
            document.getElementById('scoreGrade').innerText = grade;
            
            generateFeedback(accuracy, wpm, errors);
            renderErrorTable(errors);
            document.getElementById('visualResult').innerHTML = visualHTML;

            // 切換頁面
            document.getElementById('recordPage').classList.add('hidden');
            document.getElementById('resultsPage').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function generateFeedback(acc, wpm, errors) {
            const fbBox = document.getElementById('teacherFeedback');
            let html = '';

            // SEL 情緒支持導向的回饋
            if (acc > 90) html += `<p class="text-pop-blue text-lg">🎉 太棒了！你的發音非常準確，小芽聽得好清楚。</p>`;
            else if (acc > 75) html += `<p class="text-pop-blue text-lg">👍 很好！你已經掌握了大部分，自信心滿滿。</p>`;
            else html += `<p class="text-pop-pink text-lg">🌱 每一次開口都是成長的養分！這篇文章有點挑戰性，但你堅持讀完了，這就是最大的進步。</p>`;

            html += `<ul class="list-disc list-inside mt-3 space-y-2 text-slate-600">`;
            
            if (wpm < 80) html += `<li>語速穩穩的。如果想變快，可以把這段<strong>重複念三次</strong>，肌肉記憶會幫你加速喔！</li>`;
            else if (wpm > 160 && acc < 90) html += `<li>哇，讀得像高鐵一樣快！下次試著<strong>稍微放慢</strong>，把字尾音發清楚，分數會飆高。</li>`;
            
            if (errors.length > 0) {
                const longWordErrors = errors.filter(e => cleanText(e.word).length > 7);
                if (longWordErrors.length > 0) {
                    html += `<li>長單字（如 <span class="bg-pop-pink text-white px-1 rounded">${longWordErrors[0].word}</span>）就像積木，試著把它<strong>拆成小音節</strong>慢慢念。</li>`;
                }
                html += `<li>看看下面的單字表，把它們當作明天的小目標吧！</li>`;
            }
            html += `</ul>`;
            fbBox.innerHTML = html;
        }

        // 補齊表格渲染
        function renderErrorTable(errors) {
            const tbody = document.getElementById('errorTableBody');
            const noErr = document.getElementById('noErrorsMessage');
            tbody.innerHTML = '';
            
            if (errors.length === 0) {
                noErr.classList.remove('hidden'); 
                return;
            }
            
            noErr.classList.add('hidden');
            const displayErrors = errors.slice(0, 15);
            
            displayErrors.forEach(err => {
                let advice = '';
                const cleanWord = cleanText(err.word);
                if (cleanWord.length > 7) advice = "注意音節拆分";
                else if (cleanWord.endsWith('s') || cleanWord.endsWith('ed')) advice = "注意字尾發音";
                else advice = "多聽幾次標準發音";
                
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-3 font-black text-slate-700">${err.word}</td>
                        <td class="px-4 py-3"><span class="bg-pop-pink text-white text-xs px-2 py-1 rounded border-2 border-slate-800">跳過 / 唸錯</span></td>
                        <td class="px-4 py-3 text-xs font-bold text-slate-500 hidden md:table-cell">${advice}</td>
                    </tr>`;
            });
        }

        // 補齊重設功能
        function resetApp() {
            document.getElementById('resultsPage').classList.add('hidden');
            document.getElementById('recordPage').classList.remove('hidden');
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('stopBtn').classList.add('hidden');
            document.getElementById('liveStatus').textContent = "準備好就按下開始，我會認真聽！";
            document.getElementById('liveStatus').className = "font-bold text-slate-400";
            document.getElementById('transcriptPreview').textContent = "";
            document.getElementById('transcriptPreview').classList.add('hidden');
            document.getElementById('stopBtn').innerHTML = `🛑 完成並分析`;
            window.scrollTo(0,0);
        }

        // 補齊 OCR 事件監聽
        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            const overlay = document.getElementById('ocrOverlay');
            const status = document.getElementById('ocrStatus');
            overlay.classList.remove('hidden');
            try {
                const worker = await Tesseract.createWorker("eng", 1, { logger: m => { if (m.status === 'recognizing text') { status.textContent = `小芽努力辨識中... ${Math.round(m.progress * 100)}%`; } } });
                const ret = await worker.recognize(file);
                document.getElementById('targetText').value = ret.data.text.replace(/\n\s*\n/g, '\n').trim();
                await worker.terminate();
            } catch (err) { alert("圖片辨識失敗，請試試看清楚一點的照片");
            } finally { overlay.classList.add('hidden'); e.target.value = ''; }
        });

        // 補齊清除文字與下載
        function clearText() { document.getElementById('targetText').value = ''; }

        function downloadReport() {
            const content = document.getElementById('reportContent');
            html2canvas(content, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Reading_Report_${new Date().toISOString().slice(0,10)}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
